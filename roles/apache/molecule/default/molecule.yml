---
#dependency:
 # name: galaxy
  #options:
   # role-file: requirements.yml
dependency:
  name: shell
  command: "true"
driver:
  name: docker
platforms:
  - name: instance
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2204}-ansible:latest"
   #command: ${MOLECULE_DOCKER_COMMAND:-""}
    command: /sbin/init
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
  inventory:
    group_vars:
      all:
        lamp_http_port: 80
        lamp_http_host: "localhost"
        lamp_http_conf: "apache.conf"
scenario:
  name: default
  test_sequence:
    - destroy
    - syntax
    - create
    - prepare
    - converge
    #- idempotence
    - verify
    - destroy
